# Build the patched (dbsp engine-hook) DuckDB wheel for the SaaS backend image.
# Single server target — NOT a distribution matrix. Manual/tag trigger only, so
# normal pushes never run it. Consumes patches/v1.5.4-dbsp-txn-callback.patch.
#
# The Python client lives in the separate duckdb/duckdb-python repo (no
# tools/pythonpkg in the engine tree since the 1.2/1.3 split); its
# external/duckdb submodule pins the same engine commit as ours (v1.5.4 =
# 08e34c4). Local equivalent: scripts/build_engine_wheel.sh.
#
# ABI pairing: the patch changes DBConfig's layout — the wheel and the
# dbsp.duckdb_extension binary must be built and deployed as a pair.
name: dbsp-duckdb-wheel
on:
  workflow_dispatch: {}
  push:
    tags: ["engine-*"]

jobs:
  wheel:
    runs-on: ubuntu-22.04 # the SaaS server target; add an arm64 runner if needed
    steps:
      - uses: actions/checkout@v4

      - name: Verify engine patch exists
        run: test -f patches/v1.5.4-dbsp-txn-callback.patch

      - name: Clone duckdb-python at the matching client tag
        run: |
          git clone --branch v1.5.4 --depth 1 \
            https://github.com/duckdb/duckdb-python.git ../duckdb-python
          git -C ../duckdb-python submodule update --init --depth 1 external/duckdb

      - name: Apply engine patch to the vendored engine
        run: |
          git -C ../duckdb-python/external/duckdb apply \
            "$GITHUB_WORKSPACE/patches/v1.5.4-dbsp-txn-callback.patch"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build patched wheel (single target)
        working-directory: ../duckdb-python
        env:
          # the client's custom backend only honors OVERRIDE_GIT_DESCRIBE
          # (vX.Y.Z[-postN]); local segments are impossible → fork = .post1
          OVERRIDE_GIT_DESCRIBE: "v1.5.4-post1"
        run: |
          pip install build
          python -m build --wheel

      - name: Smoke check
        run: |
          pip install ../duckdb-python/dist/*.whl
          python -c "import duckdb; print(duckdb.__version__); assert duckdb.__version__ == '1.5.4.post1'"

      - uses: actions/upload-artifact@v4
        with:
          name: duckdb-dbsp-wheel
          path: ../duckdb-python/dist/*.whl
          retention-days: 30
